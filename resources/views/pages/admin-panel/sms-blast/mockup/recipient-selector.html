<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Blast - Recipient Selector Mockup</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'Instrument Sans', sans-serif;
        }

        body {
            background-color: rgba(27, 27, 24, 0.05);
        }

        .dark body {
            background-color: rgba(237, 237, 236, 0.1);
            color: #EDEDEC;
        }

        .recipient-card {
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1rem;
            transition: all 0.2s ease;
            cursor: pointer;
            background: white;
        }

        body.dark .recipient-card {
            background: #1f1f1e;
            border-color: #374151;
        }

        .recipient-card:hover {
            border-color: #1b1b18;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .recipient-card.selected {
            border-color: #1b1b18;
            background: rgba(27,27,24,0.05);
        }

        body.dark .recipient-card.selected {
            background: rgba(237,237,236,0.08);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .avatar.blue {
            background: #dbeafe;
            color: #1e40af;
        }

        .avatar.purple {
            background: #e9d5ff;
            color: #6b21a8;
        }

        body.dark .avatar.blue {
            background: #1e3a5f;
            color: #93c5fd;
        }

        body.dark .avatar.purple {
            background: #4c1d95;
            color: #d8b4fe;
        }

        .badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-parent {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-guardian {
            background: #e9d5ff;
            color: #6b21a8;
        }

        body.dark .badge-parent {
            background: #1e3a5f;
            color: #93c5fd;
        }

        body.dark .badge-guardian {
            background: #4c1d95;
            color: #d8b4fe;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .custom-checkbox.checked {
            background: #1b1b18;
            border-color: #1b1b18;
        }

        body.dark .custom-checkbox {
            border-color: #4b5563;
            background: #374151;
        }

        .custom-checkbox.checked svg {
            display: block;
        }

        .custom-checkbox svg {
            display: none;
            width: 12px;
            height: 12px;
            color: white;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #1b1b18;
            color: white;
        }

        body.dark .btn-primary {
            background: #EDEDEC;
            color: #1b1b18;
        }

        .btn-primary:hover {
            background: #2d2d26;
        }

        body.dark .btn-primary:hover {
            background: #d0d0ce;
        }

        .btn-outline {
            border: 1px solid #1b1b18;
            color: #1b1b18;
            background: transparent;
        }

        body.dark .btn-outline {
            border-color: #EDEDEC;
            color: #EDEDEC;
        }

        .btn-outline:hover {
            background: #1b1b18;
            color: white;
        }

        body.dark .btn-outline:hover {
            background: #EDEDEC;
            color: #1b1b18;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .search-box input {
            padding-left: 2.5rem;
        }

        .tab {
            transition: all 0.2s;
        }

        .tab.active {
            background: #1b1b18;
            color: white;
        }

        body.dark .tab.active {
            background: #EDEDEC;
            color: #1b1b18;
        }

        .count-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: white;
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .recipient-card > div:first-child {
                gap: 0.5rem;
            }
            .avatar {
                width: 32px;
                height: 32px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Success!</span>
    </div>

    <!-- Main Container -->
    <div class="min-h-screen p-4 md:p-8">
        
        <!-- Header -->
        <div class="max-w-6xl mx-auto mb-8">
            <div class="flex items-center gap-4 mb-2">
                <a href="#" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="fas fa-arrow-left text-xl"></i>
                </a>
                <div>
                    <h1 class="text-3xl font-bold">SMS Blast</h1>
                    <p class="text-gray-500">Send bulk SMS to parents and guardians</p>
                </div>
            </div>
        </div>

        <!-- Recipient Selection -->
        <div class="max-w-6xl mx-auto bg-white dark:bg-[#1f1f1e] rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
            
            <!-- Section Header -->
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <i class="fas fa-users text-blue-500"></i>
                            Step 1: Select Recipients
                        </h2>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Choose who will receive this SMS blast</p>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-bold text-blue-600" id="selectedDisplay">3</div>
                        <div class="text-xs text-gray-500">selected</div>
                    </div>
                </div>
            </div>

            <div class="p-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    <!-- Left: Recipient List -->
                    <div class="lg:col-span-2 space-y-4">
                        
                        <!-- Search -->
                        <div class="relative max-w-md">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input 
                                type="text" 
                                id="searchInput"
                                placeholder="Search by name or mobile..." 
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                        </div>

                        <!-- Tabs -->
                        <div class="flex gap-2">
                            <button id="parentsTab" class="tab active px-6 py-2 rounded-lg font-medium flex items-center gap-2" onclick="switchTab('parents')">
                                <i class="fas fa-user-family"></i> Parents
                                <span class="badge badge-parent">8</span>
                            </button>
                            <button id="guardiansTab" class="tab px-6 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-800 flex items-center gap-2" onclick="switchTab('guardians')">
                                <i class="fas fa-user-shield"></i> Guardians
                                <span class="badge badge-guardian">3</span>
                            </button>
                        </div>

                        <!-- Cards Grid -->
                        <div id="recipientsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[500px] overflow-y-auto pr-2">
                            <!-- Parent cards (8) -->
                            <!-- Guardian cards (3) -->
                        </div>

                        <!-- Select All -->
                        <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" id="selectAllCheckbox" class="w-5 h-5 rounded" onchange="toggleSelectAll()">
                                <span class="font-medium">Select All <span id="visibleType">Parents</span></span>
                            </label>
                        </div>

                    </div>

                    <!-- Right: Sidebar -->
                    <div class="lg:col-span-1">
                        <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-6 sticky top-6">
                            
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-lg font-semibold">Selected</h3>
                                <div class="relative">
                                    <i class="fas fa-users text-gray-400"></i>
                                    <span class="count-badge" id="sidebarCount">3</span>
                                </div>
                            </div>

                            <!-- Selected List -->
                            <div id="selectedList" class="space-y-2 max-h-[300px] overflow-y-auto mb-4">
                                <!-- Populated by JS -->
                            </div>

                            <!-- Empty State -->
                            <div id="emptyState" class="hidden text-center py-8">
                                <i class="fas fa-user-slash text-gray-300 dark:text-gray-600 text-3xl mb-3"></i>
                                <p class="text-sm text-gray-500">No recipients selected</p>
                            </div>

                            <!-- Cost -->
                            <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
                                <div class="flex justify-between mb-1">
                                    <span class="text-sm text-gray-600 dark:text-gray-400">Total</span>
                                    <span class="font-bold text-xl" id="sidebarCount2">3</span>
                                </div>
                                <div class="flex justify-between mb-2">
                                    <span class="text-sm text-gray-600 dark:text-gray-400">Cost/SMS</span>
                                    <span>₱1.50</span>
                                </div>
                                <div class="flex justify-between font-bold text-lg">
                                    <span>Est. Cost</span>
                                    <span class="text-green-600" id="totalCost">₱4.50</span>
                                </div>
                            </div>

                            <!-- Button -->
                            <button class="w-full btn btn-primary mt-4 py-3" onclick="proceed()">
                                Continue <i class="fas fa-arrow-right"></i>
                            </button>

                        </div>
                    </div>

                </div>
            </div>

        </div>

        <!-- Footer Links -->
        <div class="max-w-6xl mx-auto mt-6 text-center">
            <a href="#" class="text-blue-600 text-sm hover:underline">View all blasts</a>
            <span class="mx-2 text-gray-300">•</span>
            <a href="#" class="text-blue-600 text-sm hover:underline">Manage templates</a>
        </div>

    </div>

    <script>
        // Mock Data
        const parents = [
            {id: 'M06-00001', name: 'Maria Santos', mobile: '0917-123-4567'},
            {id: 'M06-00002', name: 'Juan Dela Cruz', mobile: '0905-987-6543'},
            {id: 'M06-00003', name: 'Ana Reyes', mobile: '0922-555-1234'},
            {id: 'M06-00004', name: 'Roberto Lim', mobile: '0932-111-2222'},
            {id: 'M06-00005', name: 'Sophia Garcia', mobile: '0945-333-4444'},
            {id: 'M06-00006', name: 'Luis Tan', mobile: '0912-666-7777'},
            {id: 'M06-00007', name: 'Carmen Diaz', mobile: '0938-222-3333'},
            {id: 'M06-00008', name: 'Antonio Reyes', mobile: '0906-444-5555'},
        ];

        const guardians = [
            {id: 'M06G-00001', name: 'Elena Cruz', mobile: '0918-777-8888'},
            {id: 'M06G-00002', name: 'Pedro Mendoza', mobile: '0921-999-0000'},
            {id: 'M06G-00003', name: 'Carmen Villanueva', mobile: '0935-123-4567'},
        ];

        let selected = new Set(['M06-00001', 'M06-00003', 'M06G-00001']);
        let currentTab = 'parents';

        // Render function
        function render() {
            const grid = document.getElementById('recipientsGrid');
            grid.innerHTML = '';

            const items = currentTab === 'parents' ? parents : guardians;
            items.forEach(p => {
                const isSel = selected.has(p.id);
                const card = document.createElement('div');
                card.className = `recipient-card ${isSel ? 'selected' : ''}`;
                card.onclick = () => toggle(p.id);
                card.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="pt-1">
                            <div class="custom-checkbox ${isSel ? 'checked' : ''}" onclick="event.stopPropagation(); toggle('${p.id}')">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="avatar ${currentTab === 'parents' ? 'blue' : 'purple'}">
                            ${p.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="font-medium text-sm truncate">${p.name}</div>
                            <div class="text-xs text-gray-500 flex items-center gap-1 mt-1">
                                <i class="fas fa-phone text-xs"></i> ${p.mobile}
                            </div>
                            <div class="mt-2">
                                <span class="badge ${currentTab === 'parents' ? 'badge-parent' : 'badge-guardian'}">
                                    ${currentTab === 'parents' ? 'Parent' : 'Guardian'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update counts
            document.getElementById('selectedDisplay').textContent = selected.size;
            document.getElementById('sidebarCount').textContent = selected.size;
            document.getElementById('sidebarCount2').textContent = selected.size;
            document.getElementById('totalCost').textContent = '₱' + (selected.size * 1.50).toFixed(2);
            document.getElementById('visibleType').textContent = currentTab === 'parents' ? 'Parents' : 'Guardians';

            // Render selected list
            renderSelectedList();
        }

        function renderSelectedList() {
            const list = document.getElementById('selectedList');
            list.innerHTML = '';

            const all = [...parents, ...guardians];
            selected.forEach(id => {
                const p = all.find(x => x.id === id);
                if (!p) return;
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3 bg-gray-100 dark:bg-gray-700 rounded-lg';
                item.innerHTML = `
                    <div class="flex items-center gap-2 min-w-0">
                        <div class="avatar ${p.id.startsWith('M06G') ? 'purple' : 'blue'} avatar-xs">
                            ${p.name.charAt(0)}
                        </div>
                        <div class="min-w-0">
                            <div class="text-sm font-medium truncate">${p.name}</div>
                            <div class="text-xs text-gray-500 truncate">${p.mobile}</div>
                        </div>
                    </div>
                    <button onclick="toggle('${p.id}')" class="text-gray-400 hover:text-red-500 p-1">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                list.appendChild(item);
            });

            // Empty state
            document.getElementById('emptyState').classList.toggle('hidden', selected.size > 0);
            document.getElementById('selectedList').classList.toggle('hidden', selected.size === 0);
        }

        function toggle(id) {
            if (selected.has(id)) {
                selected.delete(id);
            } else {
                selected.add(id);
            }
            render();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('parentsTab').className = tab === 'parents' ? 'tab active px-6 py-2 rounded-lg font-medium flex items-center gap-2' : 'tab px-6 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-800 flex items-center gap-2';
            document.getElementById('guardiansTab').className = tab === 'guardians' ? 'tab active px-6 py-2 rounded-lg font-medium flex items-center gap-2' : 'tab px-6 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-800 flex items-center gap-2';
            render();
        }

        function toggleSelectAll() {
            const items = currentTab === 'parents' ? parents : guardians;
            const checkbox = document.getElementById('selectAllCheckbox');
            
            if (checkbox.checked) {
                items.forEach(p => selected.add(p.id));
            } else {
                items.forEach(p => selected.delete(p.id));
            }
            render();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function proceed() {
            if (selected.size === 0) {
                showToast('Select at least one recipient');
                return;
            }
            alert('Moving to message composition with ' + selected.size + ' recipients (mockup)');
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.recipient-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(q) ? 'flex' : 'none';
            });
        });

        // Initial render
        render();
    </script>

</body>
</html>
